<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>訪問記録</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f5f5f5;
  color: #333;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
}
.card {
  background: #fff;
  border-radius: 16px;
  padding: 32px 24px;
  max-width: 360px;
  width: 100%;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  text-align: center;
}
h1 { font-size: 20px; margin-bottom: 8px; }
.status { font-size: 14px; color: #888; margin-bottom: 24px; }
.btn {
  display: block;
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  margin-bottom: 12px;
  transition: opacity 0.2s;
}
.btn:active { opacity: 0.7; }
.btn-start { background: #0D94B1; color: #fff; }
.btn-end { background: #E85D24; color: #fff; }
.btn:disabled { background: #ccc; cursor: not-allowed; }
.result {
  margin-top: 16px;
  padding: 12px;
  border-radius: 8px;
  background: #f0f9f4;
  color: #1a7f4b;
  font-size: 14px;
  display: none;
}
.result.error { background: #fef2f2; color: #b91c1c; }
.loading { display: none; margin: 16px 0; }
.loading.show { display: block; }
.spinner {
  width: 32px; height: 32px;
  border: 3px solid #e0e0e0;
  border-top-color: #0D94B1;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="card">
  <h1>訪問記録</h1>
  <p class="status" id="statusText">初期化中...</p>

  <button class="btn btn-start" id="btnStart" onclick="recordVisit('start')" disabled>
    訪問開始
  </button>
  <button class="btn btn-end" id="btnEnd" onclick="recordVisit('end')" disabled>
    訪問終了
  </button>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p style="font-size:13px;color:#888;">記録中...</p>
  </div>

  <div class="result" id="result"></div>
</div>
