<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>訪問記録</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f5f5f5;
  color: #333;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
}
.card {
  background: #fff;
  border-radius: 16px;
  padding: 32px 24px;
  max-width: 360px;
  width: 100%;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  text-align: center;
}
h1 { font-size: 20px; margin-bottom: 8px; }
.status { font-size: 14px; color: #888; margin-bottom: 24px; }
.btn {
  display: block;
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  margin-bottom: 12px;
  transition: opacity 0.2s;
}
.btn:active { opacity: 0.7; }
.btn-start { background: #0D94B1; color: #fff; }
.btn-end { background: #E85D24; color: #fff; }
.btn:disabled { background: #ccc; cursor: not-allowed; }
.result {
  margin-top: 16px;
  padding: 12px;
  border-radius: 8px;
  background: #f0f9f4;
  color: #1a7f4b;
  font-size: 14px;
  display: none;
}
.result.error { background: #fef2f2; color: #b91c1c; }
.loading { display: none; margin: 16px 0; }
.loading.show { display: block; }
.spinner {
  width: 32px; height: 32px;
  border: 3px solid #e0e0e0;
  border-top-color: #0D94B1;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="card">
  <h1 id="titleText">訪問記録</h1>
  <p class="status" id="statusText">初期化中...</p>

  <div class="loading show" id="loading">
    <div class="spinner"></div>
    <p style="font-size:13px;color:#888;" id="loadingText">準備中...</p>
  </div>

  <div class="result" id="result"></div>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
var LIFF_ID = '2009637814-TV9ZPeT7';
var GAS_URL = 'https://script.google.com/a/macros/warm-relationship.com/s/AKfycbwmiM9VySnUGxLKaOQMOLKye3JRQN1ZzBVElykHrXwo4Y6DCoDOPru7irJAyUZyJDzB/exec';

var userProfile = null;
var currentPosition = null;

function getMode() {
  var url = window.location.href;
  if (url.indexOf('mode=start') !== -1) return 'start';
  if (url.indexOf('mode=end') !== -1) return 'end';
  return null;
}

async function init() {
  var statusText = document.getElementById('statusText');
  var titleText = document.getElementById('titleText');
  var loadingText = document.getElementById('loadingText');
  var mode = getMode();

  if (mode === 'start') {
    titleText.textContent = '訪問開始';
  } else if (mode === 'end') {
    titleText.textContent = '訪問終了';
  }

  try {
    statusText.textContent = 'LIFF初期化中...';
    loadingText.textContent = '初期化中...';
    await liff.init({ liffId: LIFF_ID });

    if (!liff.isLoggedIn()) {
      statusText.textContent = 'LINEログイン中...';
      liff.login();
      return;
    }

    statusText.textContent = 'プロフィール取得中...';
